services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopify_import}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-shopify_import}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    # ports: internal only — not exposed to host
    #  - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/shopify_import}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:-placeholder_api_key}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:-placeholder_api_secret}
      SHOPIFY_APP_URL: ${SHOPIFY_APP_URL:-http://localhost}
      TYPEORM_SYNCHRONIZE: ${TYPEORM_SYNCHRONIZE:-true}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # ports: internal only — accessed via nginx
    #  - '3001:3001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      WEB_PORT: ${WEB_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/shopify_import}
      API_INTERNAL_URL: http://api:3001
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:-placeholder_api_key}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:-placeholder_api_secret}
      SHOPIFY_APP_URL: ${SHOPIFY_APP_URL:-http://localhost}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'nc -z 127.0.0.1 3000 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    # ports: internal only — accessed via nginx
    #  - '3000:3000'

  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - '127.0.0.1:8090:8080'
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - '127.0.0.1:8082:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
